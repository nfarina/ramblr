name: RamblrMobile
options:
  bundleIdPrefix: com.nfarina
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  RamblrKit:
    path: ../RamblrKit

targets:
  RamblrMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: RamblrKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nfarina.RamblrMobile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: RCRD96UZHN
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Ramblr records your voice to transcribe it with Whisper."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Ramblr"
